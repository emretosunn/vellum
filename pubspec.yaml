name: vellum
description: "Vellum - Digital Publishing Platform by Vexorabyte"
publish_to: 'none'

version: 0.4.2+10

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.9.0

  # UI / Styling
  flex_color_scheme: ^8.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  concentric_transition: ^1.0.3
  animations: ^2.1.1

  # Editor
  flutter_quill: ^11.1.0

  # Image Picker
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1

  # Çeviri / yerelleştirme
  flutter_translate: ^3.1.0

  # Uygulama içi satın alma (Google Play)
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0+8

  # Uygulama içi güncelleme (Android, Google Play)
  in_app_update: ^4.2.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  # riverpod_generator ve riverpod_lint geçici kapalı (analyzer uyumsuzluğu)
  # riverpod_generator: ^2.6.3
  # riverpod_lint: ^2.6.3

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/image/
    - assets/i18n/
    - assets/i18n/tr.json
    - assets/i18n/en.json
